variant: openshift
version: 4.21.0
metadata:
  name: worker
  labels:
    machineconfiguration.openshift.io/role: worker
storage:
  files:
    - path: /etc/motd
      mode: 0644
      contents:
        inline: |
          ${message}
passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - ssh-key foo
